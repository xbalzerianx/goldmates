// ─── Helpers ─────────────────────────────────────────────────────────────────
function Badge({status}){
  const k=(status||"").toLowerCase().replace(/\s+/g,"-");
  return <span className={`badge badge-${k}`}>{status}</span>;
}

function formatDate(d){
  if(!d)return"";
  const dt=new Date(d);
  return dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function formatTime(d){
  if(!d)return"";
  const dt=new Date(d);
  return dt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function timeAgo(d){
  if(!d)return"";
  const diff=Date.now()-new Date(d).getTime();
  const m=Math.floor(diff/60000);
  if(m<1)return"just now";
  if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);
  if(h<24)return`${h}h ago`;
  return`${Math.floor(h/24)}d ago`;
}

// ─── Calendar ─────────────────────────────────────────────────────────────────
function CalendarView({appointments,onSelectAppt,onNewAppt}){
  const today=new Date();
  const[current,setCurrent]=useState({year:today.getFullYear(),month:today.getMonth()});
  const[selected,setSelected]=useState(null);

  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDay=(y,m)=>new Date(y,m,1).getDay();
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const {year,month}=current;
  const days=daysInMonth(year,month);
  const startDay=firstDay(year,month);
  const prevDays=daysInMonth(year,month-1);

  const apptsByDate=useMemo(()=>{
    const map={};
    appointments.forEach(a=>{
      if(!map[a.preferred_date])map[a.preferred_date]=[];
      map[a.preferred_date].push(a);
    });
    return map;
  },[appointments]);

  const cells=[];
  // prev month trailing days
  for(let i=startDay-1;i>=0;i--){
    cells.push({day:prevDays-i,current:false,date:null});
  }
  // current month
  for(let d=1;d<=days;d++){
    const mm=String(month+1).padStart(2,"0");
    const dd=String(d).padStart(2,"0");
    cells.push({day:d,current:true,date:`${year}-${mm}-${dd}`});
  }
  // next month
  const remaining=(7-cells.length%7)%7;
  for(let i=1;i<=remaining;i++) cells.push({day:i,current:false,date:null});

  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const statusColor={Confirmed:"#dcfce7",Pending:"#fef3c7",Completed:"#dbeafe",Cancelled:"#fee2e2"};
  const statusText={Confirmed:"#166534",Pending:"#92400e",Completed:"#1e40af",Cancelled:"#991b1b"};

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 className="playfair" style={{fontSize:22,fontWeight:700}}>Appointment Calendar</h2>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setCurrent(c=>{const d=new Date(c.year,c.month-1);return{year:d.getFullYear(),month:d.getMonth()}})} style={{width:32,height:32,borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <span style={{fontWeight:700,fontSize:15,minWidth:140,textAlign:"center"}}>{MONTHS[month]} {year}</span>
          <button onClick={()=>setCurrent(c=>{const d=new Date(c.year,c.month+1);return{year:d.getFullYear(),month:d.getMonth()}})} style={{width:32,height:32,borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          <button className="btn btn-primary" style={{marginLeft:8}} onClick={()=>onNewAppt()}>+ Book Appointment</button>
        </div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
        {Object.entries(statusColor).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:12}}>
            <div style={{width:10,height:10,borderRadius:3,background:v,border:`1px solid ${statusText[k]}33`}}/>
            <span style={{color:"#6b7280"}}>{k}</span>
          </div>
        ))}
      </div>

      <div className="card" style={{overflow:"hidden"}}>
        {/* Header */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
          {DAYS.map(d=><div key={d} style={{padding:"10px 0",textAlign:"center",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".5px"}}>{d}</div>)}
        </div>
        {/* Grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((cell,i)=>{
            const appts=cell.date?apptsByDate[cell.date]||[]:[];
            const isToday=cell.date===todayStr;
            const isSel=cell.date&&selected===cell.date;
            return(
              <div key={i} className={`cal-day${isToday?" today":""}${!cell.current?" other-month":""}`}
                style={{borderColor:isSel?"#9d2040":undefined,background:isSel?"#fff5f7":undefined}}
                onClick={()=>{if(cell.date){setSelected(cell.date);}}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <span style={{fontSize:12,fontWeight:isToday?700:500,color:isToday?"#9d2040":cell.current?"#374151":"#d1d5db",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday?"#fde8ef":"transparent"}}>{cell.day}</span>
                  {appts.length>0&&<span style={{fontSize:9,fontWeight:700,color:"#9d2040",background:"#fde8ef",borderRadius:10,padding:"1px 5px"}}>{appts.length}</span>}
                </div>
                {appts.slice(0,2).map(a=>(
                  <div key={a.id} className="cal-event"
                    style={{background:statusColor[a.status]||"#f3f4f6",color:statusText[a.status]||"#374151"}}
                    onClick={e=>{e.stopPropagation();onSelectAppt(a);}}>
                    {a.preferred_time} {a.client_name.split(" ")[0]}
                  </div>
                ))}
                {appts.length>2&&<div style={{fontSize:10,color:"#9ca3af",paddingLeft:2}}>+{appts.length-2} more</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Selected day sidebar */}
      {selected&&apptsByDate[selected]&&(
        <div className="card" style={{marginTop:16,padding:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#111"}}>
            📅 Appointments on {new Date(selected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(apptsByDate[selected]||[]).map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"#f9fafb",borderRadius:8,cursor:"pointer"}} onClick={()=>onSelectAppt(a)}>
                <div style={{fontSize:12,fontWeight:700,color:"#9d2040",minWidth:60}}>{a.preferred_time}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{a.client_name}</div>
                  <div style={{fontSize:12,color:"#6b7280"}}>{a.service}</div>
                </div>
                <Badge status={a.status}/>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Appointments Page ────────────────────────────────────────────────────────
function AppointmentsPage({appointments,setAppointments}){
  const[modal,setModal]=useState(null);
  const[search,setSearch]=useState("");
  const[filter,setFilter]=useState("All");
  const[view,setView]=useState("list");

  const filtered=appointments.filter(a=>{
    const q=search.toLowerCase();
    return(a.client_name.toLowerCase().includes(q)||a.service.toLowerCase().includes(q)||a.client_email.toLowerCase().includes(q))&&(filter==="All"||a.status===filter);
  });

  const save=form=>{
    if(form.id) setAppointments(prev=>prev.map(a=>a.id===form.id?{...a,...form}:a));
    else setAppointments(prev=>[{...form,id:"a"+Date.now(),created_date:new Date().toISOString()},...prev]);
    setModal(null);
  };
  const del=id=>{if(confirm("Delete this appointment?"))setAppointments(prev=>prev.filter(a=>a.id!==id))};

  return(
    <div>

          </div>
          <div className="card" style={{overflow:"hidden"}}>
            <table>
              <thead>
                <tr>
                  <th>Client</th><th>Service</th><th>Date & Time</th><th>Source</th><th>Status</th><th>Actions</th>

                      <div style={{fontSize:11,color:"#9ca3af"}}>{a.client_phone}</div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(l=>(
          <div key={l.id} className="card" style={{padding:16,cursor:"pointer",transition:"box-shadow .15s"}} onClick={()=>setModal(l)}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.1)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,.08)"}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{width:40,height:40,borderRadius:10,background:"#fde8ef",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{fontWeight:700,fontSize:14,color:"#111"}}>{l.name}</span>
                  <Badge status={l.status}/>
                  <span className="tag">{l.form_type}</span>
                </div>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{l.service_interest} · {l.email} · {l.phone}</div>
                <div style={{fontSize:13,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:500}}>{l.message}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>{timeAgo(l.created_date)}</div>
                <div style={{display:"flex",gap:6}}>
                  <a href={`mailto:${l.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:11,background:"#f3f4f6",padding:"4px 8px",borderRadius:6,textDecoration:"none",color:"#374151"}}>📧 Email</a>
                  <a href={`tel:${l.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:11,background:"#f3f4f6",padding:"4px 8px",borderRadius:6,textDecoration:"none",color:"#374151"}}>📞 Call</a>
                </div>
              </div>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#9ca3af"}}>No leads found</div>}
      </div>
      {modal&&<LeadModal lead={modal} onClose={()=>setModal(null)} onSave={save}/>}
    </div>
  );
}

// ─── Blog Page ────────────────────────────────────────────────────────────────
function BlogPage({posts,setPosts}){
  const[modal,setModal]=useState(null);
  const[filter,setFilter]=useState("All");

  const filtered=posts.filter(p=>filter==="All"||p.status===filter);
  const save=form=>{
    if(form.id) setPosts(prev=>prev.map(p=>p.id===form.id?{...p,...form}:p));
    else setPosts(prev=>[{...form,id:"p"+Date.now()},...prev]);
    setModal(null);
  };
  const del=id=>{if(confirm("Delete this post?"))setPosts(prev=>prev.filter(p=>p.id!==id))};
  const toggle=id=>setPosts(prev=>prev.map(p=>p.id===id?{...p,status:p.status==="Published"?"Draft":"Published"}:p));

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h1 className="playfair" style={{fontSize:24,fontWeight:700}}>Blog Posts</h1>
          <p style={{color:"#6b7280",fontSize:13,marginTop:2}}>{posts.filter(p=>p.status==="Published").length} published · {posts.filter(p=>p.status==="Draft").length} drafts</p>
        </div>
        <button className="btn btn-primary" onClick={()=>setModal({})}>+ New Post</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["All","Published","Draft"].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:filter===s?"#9d2040":"#f3f4f6",color:filter===s?"#fff":"#6b7280",transition:"all .15s"}}>{s}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(p=>(
          <div key={p.id} className="card" style={{padding:16,display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{width:64,height:64,borderRadius:10,background:"linear-gradient(135deg,#9d2040,#c0392b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,overflow:"hidden"}}>
              {p.cover_image?<img src={p.cover_image} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:"✍️"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:14,color:"#111"}}>{p.title}</span>
                <Badge status={p.status}/>
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.excerpt}</div>
              <div style={{display:"flex",gap:12,fontSize:11,color:"#9ca3af",flexWrap:"wrap"}}>
                <span>📁 {p.category}</span>
                <span>✍️ {p.author}</span>
                {p.published_date&&<span>📅 {p.published_date}</span>}
                {p.tags&&p.tags.split(",").slice(0,2).map(t=><span key={t} className="tag">{t.trim()}</span>)}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end",flexShrink:0}}>
              <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>setModal(p)}>Edit</button>
              <button onClick={()=>toggle(p.id)} style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:p.status==="Published"?"#fef3c7":"#dcfce7",color:p.status==="Published"?"#92400e":"#065f46"}}>
                {p.status==="Published"?"Unpublish":"Publish"}
              </button>
              <button onClick={()=>del(p.id)} style={{fontSize:12,color:"#dc2626",background:"none",border:"none",cursor:"pointer",padding:"5px 12px"}}>Delete</button>
            </div>
          </div>
        ))}
      </div>
      {modal!==null&&<BlogModal post={modal?.id?modal:null} onClose={()=>setModal(null)} onSave={save}/>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState("dashboard");
  const[appointments,setAppointments]=useState(DB.appointments);
  const[leads,setLeads]=useState(DB.leads);
  const[posts,setPosts]=useState(DB.posts);
  const[sidebarOpen,setSidebarOpen]=useState(true);

  const pending=appointments.filter(a=>a.status==="Pending").length;
  const newLeads=leads.filter(l=>l.status==="New").length;

  const nav=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"appointments",icon:"📅",label:"Appointments",badge:pending},
    {id:"calendar",icon:"🗓️",label:"Calendar"},
    {id:"leads",icon:"💬",label:"Leads",badge:newLeads},
    {id:"blog",icon:"✍️",label:"Blog Posts"},
  ];

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Sidebar */}
      <div className="sidebar" style={{flexShrink:0}}>
        <div style={{padding:"20px 16px 16px",borderBottom:"1px solid #1f1f1f"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:"#9d2040",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:15,color:"#fff",flexShrink:0}}>C</div>
            <div>
              <div className="playfair" style={{fontWeight:700,fontSize:14,color:"#fff",letterSpacing:".5px"}}>CAIR SPA</div>
              <div style={{fontSize:10,color:"#4b5563",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px"}}>Admin Portal</div>
            </div>
          </div>
        </div>

        <nav style={{flex:1,padding:"12px 0"}}>
          <div style={{padding:"4px 16px 8px",fontSize:9,fontWeight:700,color:"#4b5563",textTransform:"uppercase",letterSpacing:"1px"}}>Navigation</div>
          {nav.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
              <span style={{fontSize:15}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge>0&&<span style={{background:page===n.id?"rgba(255,255,255,.25)":"#9d2040",color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{n.badge}</span>}
            </div>
          ))}
        </nav>

        <div style={{padding:"12px 16px",borderTop:"1px solid #1f1f1f"}}>
          <a href="https://cairspa.com" target="_blank" style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#6b7280",textDecoration:"none",padding:"8px 10px",borderRadius:8,background:"#1a1a1a"}}>
            <span>🌐</span> <span>cairspa.com</span> <span style={{marginLeft:"auto",fontSize:10}}>↗</span>
          </a>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflow:"auto",background:"#f8f7f5"}}>
        {/* Top bar */}
        <div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"12px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{fontSize:13,color:"#6b7280"}}>
            {new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {newLeads>0&&<div style={{display:"flex",alignItems:"center",gap:6,background:"#fef3c7",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#92400e",cursor:"pointer"}} onClick={()=>setPage("leads")}>
              <span className="notif-dot"/>  {newLeads} new lead{newLeads>1?"s":""}
            </div>}
            <div style={{width:32,height:32,borderRadius:8,background:"#9d2040",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>A</div>
          </div>
        </div>

        <div style={{padding:"28px 28px",maxWidth:1100,margin:"0 auto"}}>
          {page==="dashboard"&&<Dashboard appointments={appointments} leads={leads} posts={posts} onNav={setPage}/>}
          {page==="appointments"&&<AppointmentsPage appointments={appointments} setAppointments={setAppointments}/>}
          {page==="calendar"&&<CalendarView appointments={appointments} onSelectAppt={a=>{setPage("appointments");}} onNewAppt={()=>setPage("appointments")}/>}
          {page==="leads"&&<LeadsPage leads={leads} setLeads={setLeads}/>}
          {page==="blog"&&<BlogPage posts={posts} setPosts={setPosts}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
