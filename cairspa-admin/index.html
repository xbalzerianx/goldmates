<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CAIR SPA — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@base44/sdk/dist/index.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8f7f5;color:#1a1a1a}
.playfair{font-family:'Playfair Display',serif}
.sidebar{width:240px;min-height:100vh;background:#0f0f0f;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:20}
.main-content{margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:#9ca3af;transition:all .15s;margin:1px 8px}
.nav-item:hover{background:#1f1f1f;color:#fff}
.nav-item.active{background:#9d2040;color:#fff}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-confirmed{background:#d1fae5;color:#065f46}
.badge-completed{background:#dbeafe;color:#1e40af}
.badge-cancelled{background:#fee2e2;color:#991b1b}
.badge-new{background:#fef9c3;color:#92400e}
.badge-contacted{background:#dbeafe;color:#1e40af}
.badge-converted{background:#d1fae5;color:#065f46}
.badge-closed{background:#f3f4f6;color:#6b7280}
.badge-published{background:#d1fae5;color:#065f46}
.badge-draft{background:#f3f4f6;color:#6b7280}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#9d2040;color:#fff}
.btn-primary:hover{background:#7d1830}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid #e5e7eb}
.btn-ghost:hover{background:#f9fafb}
.input{width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border .15s;background:#fff}
.input:focus{border-color:#9d2040;box-shadow:0 0 0 3px rgba(157,32,64,.08)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:28px}
.cal-day{min-height:90px;border:1px solid #f3f4f6;border-radius:8px;padding:6px;cursor:pointer;transition:background .1s}
.cal-day:hover{background:#fdf2f5}
.cal-day.today{border-color:#9d2040;background:#fff5f7}
.cal-day.other-month{background:#fafafa;opacity:.6}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;background:#f9fafb;border-bottom:1px solid #f3f4f6}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid #f9fafb;vertical-align:middle}
tr:hover td{background:#fafafa}
.tag{display:inline-block;background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#9ca3af;font-size:14px;gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid #e5e7eb;border-top-color:#9d2040;border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ── Base44 SDK Setup ──────────────────────────────────────────────────────────
const APP_ID = "69b7cae883aa8d618e49d211";
let sdk;
try {
  sdk = Base44.createClient({ appId: APP_ID });
} catch(e) {
  console.warn("SDK init:", e);
}

const Appointment = sdk?.entities?.Appointment;
const LeadForm = sdk?.entities?.LeadForm;
const BlogPost = sdk?.entities?.BlogPost;
const User = sdk?.entities?.User;
const auth = sdk?.auth;

// ── Constants ─────────────────────────────────────────────────────────────────
const SERVICES=["Dermal Fillers","Hydrafacial","RF Microneedling","Thread Lift","IV Infusions","Skin Rejuvenation","Vein Treatment","Weight Loss Injections","Exosome Therapy","NAD Therapy","Hair Transplant ARTAS","Other"];
const TIMES=["9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM"];
const APPT_STATUSES=["Pending","Confirmed","Completed","Cancelled"];
const LEAD_STATUSES=["New","Contacted","Converted","Closed"];
const CATEGORIES=["Skin Care","Body Treatments","Hair","Wellness","News","Tips"];
const SVC_COLOR={"Dermal Fillers":["#fde8ef","#9d174d"],"Hydrafacial":["#e0f2fe","#0369a1"],"RF Microneedling":["#f0fdf4","#166534"],"Thread Lift":["#fef9c3","#854d0e"],"IV Infusions":["#ede9fe","#5b21b6"],"Skin Rejuvenation":["#fff7ed","#c2410c"],"Vein Treatment":["#f0f9ff","#0c4a6e"],"Weight Loss Injections":["#fdf4ff","#7e22ce"],"Exosome Therapy":["#f0fdf4","#14532d"],"NAD Therapy":["#eff6ff","#1e3a8a"],"Hair Transplant ARTAS":["#fff1f2","#881337"],"Other":["#f9fafb","#374151"]};
const STATUS_COLORS={Confirmed:["#dcfce7","#166534"],Pending:["#fef3c7","#92400e"],Completed:["#dbeafe","#1e40af"],Cancelled:["#fee2e2","#991b1b"]};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt=d=>{if(!d)return"";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})};
const timeAgo=d=>{if(!d)return"";const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return"just now";if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ago`;return`${Math.floor(h/24)}d ago`};
const todayStr=()=>new Date().toISOString().split("T")[0];

function Badge({status}){
  const k=(status||"").toLowerCase().replace(/\s+/g,"-");
  return <span className={`badge badge-${k}`}>{status}</span>;
}
function Spinner(){return <div className="spinner"/>}
function Loading(){return <div className="loading"><Spinner/>Loading...</div>}

// ── Login Page ────────────────────────────────────────────────────────────────
function LoginPage({onLogin}){
  const[email,setEmail]=useState("admincairspa@cairspa.com");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const submit=async(e)=>{
    e.preventDefault();
    setLoading(true);setErr("");
    try{
      await auth.login(email,pass);
      onLogin();
    }catch(e2){
      setErr("Invalid email or password. Please try again.");
    }finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0f0f 0%,#1a0a12 50%,#0f0f0f 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:60,height:60,background:"#9d2040",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#fff",margin:"0 auto 16px"}}>C</div>
          <h1 className="playfair" style={{fontSize:28,fontWeight:700,color:"#fff",marginBottom:6}}>CAIR SPA</h1>
          <p style={{color:"#6b7280",fontSize:13}}>Admin Portal</p>
        </div>
        <form onSubmit={submit} style={{background:"#fff",borderRadius:16,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,fontWeight:700,color:"#6b7280",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Email</label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required autoFocus/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,fontWeight:700,color:"#6b7280",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Password</label>
            <input className="input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••••••••" required/>
          </div>
          {err&&<div style={{background:"#fee2e2",color:"#991b1b",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:16}}>{err}</div>}
          <button type="submit" className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"11px 0",fontSize:14}} disabled={loading}>
            {loading?<><Spinner/>Signing in...</>:"Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Appointment Modal ─────────────────────────────────────────────────────────
function ApptModal({appt,onClose,onSave}){
  const[form,setForm]=useState(appt||{client_name:"",client_email:"",client_phone:"",service:"Dermal Fillers",preferred_date:"",preferred_time:"10:00 AM",notes:"",status:"Pending",source:"Website Form"});
  const[saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    setSaving(true);
    try{await onSave(form);}finally{setSaving(false);}
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 className="playfair" style={{fontSize:20,fontWeight:700}}>{appt?.id?"Edit Appointment":"New Appointment"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Client Name *</label>
            <input className="input" value={form.client_name} onChange={e=>set("client_name",e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Phone</label>
            <input className="input" value={form.client_phone} onChange={e=>set("client_phone",e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Email</label>
            <input className="input" type="email" value={form.client_email} onChange={e=>set("client_email",e.target.value)}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Service</label>
            <select className="input" value={form.service} onChange={e=>set("service",e.target.value)}>
              {SERVICES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Date</label>
            <input type="date" className="input" value={form.preferred_date} onChange={e=>set("preferred_date",e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Time</label>
            <select className="input" value={form.preferred_time} onChange={e=>set("preferred_time",e.target.value)}>
              {TIMES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Status</label>
            <select className="input" value={form.status} onChange={e=>set("status",e.target.value)}>
              {APPT_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Source</label>
            <select className="input" value={form.source} onChange={e=>set("source",e.target.value)}>
              {["Website Form","Callback Request","Walk-in","Phone"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Notes</label>
            <textarea className="input" rows={3} style={{resize:"vertical"}} value={form.notes} onChange={e=>set("notes",e.target.value)}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>
            {saving?<><Spinner/>Saving...</>:"Save Appointment"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Lead Modal ────────────────────────────────────────────────────────────────
function LeadModal({lead,onClose,onSave}){
  const[status,setStatus]=useState(lead.status||"New");
  const[saving,setSaving]=useState(false);
  const save=async()=>{setSaving(true);try{await onSave({...lead,status});}finally{setSaving(false);}};
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 className="playfair" style={{fontSize:20,fontWeight:700}}>Lead Details</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af"}}>✕</button>
        </div>
        <div style={{background:"#f9fafb",borderRadius:10,padding:16,marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["Name",lead.name],["Phone",lead.phone],["Email",lead.email,"1/-1"],["Service Interest",lead.service_interest],["Form Type",lead.form_type],["Received",timeAgo(lead.created_date)]].map(([k,v,span])=>(
              <div key={k} style={{gridColumn:span||"auto"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".4px",marginBottom:2}}>{k}</div>
                <div style={{fontSize:13,fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>
          {lead.message&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #e5e7eb"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".4px",marginBottom:4}}>Message</div>
            <div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{lead.message}</div>
          </div>}
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:".4px"}}>Update Status</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {LEAD_STATUSES.map(s=>(
              <button key={s} onClick={()=>setStatus(s)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:"2px solid",borderColor:status===s?"#9d2040":"#e5e7eb",background:status===s?"#9d2040":"#fff",color:status===s?"#fff":"#374151",transition:"all .15s"}}>{s}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <a href={`mailto:${lead.email}`} className="btn btn-ghost" style={{flex:1,justifyContent:"center",textDecoration:"none"}}>📧 Email</a>
          <a href={`tel:${lead.phone}`} className="btn btn-ghost" style={{flex:1,justifyContent:"center",textDecoration:"none"}}>📞 Call</a>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<><Spinner/>Saving...</>:"Save"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Blog Modal ────────────────────────────────────────────────────────────────
function BlogModal({post,onClose,onSave}){
  const[form,setForm]=useState(post||{title:"",slug:"",excerpt:"",content:"",cover_image:"",category:"Skin Care",tags:"",author:"CAIR SPA Team",status:"Draft",published_date:"",seo_title:"",seo_description:""});
  const[tab,setTab]=useState("content");
  const[saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const slug=t=>t.toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g,"-");
  const save=async()=>{setSaving(true);try{await onSave(form);}finally{setSaving(false);}};

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:700}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 className="playfair" style={{fontSize:20,fontWeight:700}}>{post?.id?"Edit Post":"New Blog Post"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:0,borderBottom:"1px solid #e5e7eb",marginBottom:18}}>
          {[["content","Content"],["seo","SEO & Meta"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 18px",fontSize:13,fontWeight:600,cursor:"pointer",border:"none",borderBottom:`2px solid ${tab===t?"#9d2040":"transparent"}`,background:"transparent",color:tab===t?"#9d2040":"#6b7280"}}>{l}</button>
          ))}
        </div>
        {tab==="content"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Title</label>
            <input className="input" value={form.title} onChange={e=>{set("title",e.target.value);if(!post?.id)set("slug",slug(e.target.value));}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Slug</label>
              <input className="input" value={form.slug} onChange={e=>set("slug",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Category</label>
              <select className="input" value={form.category} onChange={e=>set("category",e.target.value)}>
                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Status</label>
              <select className="input" value={form.status} onChange={e=>set("status",e.target.value)}>
                <option>Draft</option><option>Published</option>
              </select>
            </div>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Excerpt</label>
            <textarea className="input" rows={2} style={{resize:"vertical"}} value={form.excerpt} onChange={e=>set("excerpt",e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Content (HTML)</label>
            <textarea className="input" rows={10} style={{fontFamily:"monospace",fontSize:12,resize:"vertical"}} value={form.content} onChange={e=>set("content",e.target.value)}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Tags</label>
              <input className="input" value={form.tags} onChange={e=>set("tags",e.target.value)} placeholder="skin care, hydrafacial"/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Cover Image URL</label>
              <input className="input" value={form.cover_image} onChange={e=>set("cover_image",e.target.value)}/>
            </div>
          </div>
        </div>}
        {tab==="seo"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7280",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>SEO Title <span style={{color:form.seo_title.length>60?"#ef4444":"#9ca3af"}}>{form.seo_title.length}/60</span></label>
            <input className="input" value={form.seo_title} onChange={e=>set("seo_title",e.target.value)}/>
          </div>
          <div>

// ── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({appointments,onEdit,onNew}){
  const today=new Date();
  const[cur,setCur]=useState({y:today.getFullYear(),m:today.getMonth()});
  const[sel,setSel]=useState(null);
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const {y,m}=cur;
  const dim=(yr,mo)=>new Date(yr,mo+1,0).getDate();
  const fd=(yr,mo)=>new Date(yr,mo,1).getDay();
  const todayS=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const byDate=useMemo(()=>{
    const map={};
    (appointments||[]).forEach(a=>{if(!map[a.preferred_date])map[a.preferred_date]=[];map[a.preferred_date].push(a);});
    return map;
  },[appointments]);

  const cells=[];
  const sd=fd(y,m),days=dim(y,m),pd=dim(y,m-1);
  for(let i=sd-1;i>=0;i--)cells.push({day:pd-i,cur:false,date:null});
  for(let d=1;d<=days;d++){const mm=String(m+1).padStart(2,"0"),dd=String(d).padStart(2,"0");cells.push({day:d,cur:true,date:`${y}-${mm}-${dd}`});}
  const rem=(7-cells.length%7)%7;
  for(let i=1;i<=rem;i++)cells.push({day:i,cur:false,date:null});

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h1 className="playfair" style={{fontSize:24,fontWeight:700}}>Calendar</h1>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setCur(c=>{const d=new Date(c.y,c.m-1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{width:32,height:32,borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16}}>‹</button>
          <span style={{fontWeight:700,fontSize:15,minWidth:150,textAlign:"center"}}>{MONTHS[m]} {y}</span>
          <button onClick={()=>setCur(c=>{const d=new Date(c.y,c.m+1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{width:32,height:32,borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16}}>›</button>
          <button className="btn btn-primary" onClick={onNew}>+ Book</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {Object.entries(STATUS_COLORS).map(([k,[bg,tc]])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:12}}>
            <div style={{width:10,height:10,borderRadius:3,background:bg,border:`1px solid ${tc}33`}}/>
            <span style={{color:"#6b7280"}}>{k}</span>
          </div>
        ))}
      </div>
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
          {DAYS.map(d=><div key={d} style={{padding:"10px 0",textAlign:"center",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".5px"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((cell,i)=>{
            const appts=cell.date?byDate[cell.date]||[]:[];
            const isT=cell.date===todayS;
            return(
              <div key={i} className={`cal-day${isT?" today":""}${!cell.cur?" other-month":""}`} style={{borderColor:sel===cell.date?"#9d2040":undefined}} onClick={()=>cell.date&&setSel(cell.date===sel?null:cell.date)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <span style={{fontSize:12,fontWeight:isT?700:500,color:isT?"#9d2040":cell.cur?"#374151":"#d1d5db",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isT?"#fde8ef":"transparent"}}>{cell.day}</span>
                  {appts.length>0&&<span style={{fontSize:9,fontWeight:700,color:"#9d2040",background:"#fde8ef",borderRadius:10,padding:"1px 5px"}}>{appts.length}</span>}
                </div>
                {appts.slice(0,2).map(a=>{const[bg,tc]=STATUS_COLORS[a.status]||["#f3f4f6","#374151"];return(
                  <div key={a.id} className="cal-event" style={{background:bg,color:tc}} onClick={e=>{e.stopPropagation();onEdit(a);}}>{a.preferred_time} {a.client_name.split(" ")[0]}</div>
                )})}
                {appts.length>2&&<div style={{fontSize:10,color:"#9ca3af",paddingLeft:2}}>+{appts.length-2}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {sel&&byDate[sel]&&<div className="card" style={{marginTop:14,padding:16}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>📅 {new Date(sel+"T12:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        {byDate[sel].map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:"#f9fafb",borderRadius:8,marginBottom:6,cursor:"pointer"}} onClick={()=>onEdit(a)}>
            <div style={{fontSize:12,fontWeight:700,color:"#9d2040",minWidth:65}}>{a.preferred_time}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{a.client_name}</div><div style={{fontSize:11,color:"#6b7280"}}>{a.service}</div></div>
            <Badge status={a.status}/>
          </div>
        ))}
      </div>}
    </div>
  );
}

          <p style={{color:"#6b7280",fontSize:13,marginTop:2}}>{(posts||[]).filter(p=>p.status==="Published").length} published · {(posts||[]).filter(p=>p.status==="Draft").length} drafts</p>
        </div>
        <button className="btn btn-primary" onClick={()=>setModal({})}>+ New Post</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["All","Published","Draft"].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:filter===s?"#9d2040":"#f3f4f6",color:filter===s?"#fff":"#6b7280"}}>{s}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(p=>(
          <div key={p.id} className="card" style={{padding:16,display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{width:60,height:60,borderRadius:10,background:"linear-gradient(135deg,#9d2040,#c0392b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,overflow:"hidden"}}>
              {p.cover_image?<img src={p.cover_image} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:"✍️"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:14}}>{p.title}</span>
                <Badge status={p.status}/>
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.excerpt}</div>
              <div style={{display:"flex",gap:10,fontSize:11,color:"#9ca3af",flexWrap:"wrap"}}>
                <span>📁 {p.category}</span>
                {p.published_date&&<span>📅 {p.published_date}</span>}
                {p.tags&&p.tags.split(",").slice(0,2).map(t=><span key={t} className="tag">{t.trim()}</span>)}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end",flexShrink:0}}>
              <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>setModal(p)}>Edit</button>
              <button onClick={()=>toggle(p)} style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:p.status==="Published"?"#fef3c7":"#dcfce7",color:p.status==="Published"?"#92400e":"#065f46"}}>
                {p.status==="Published"?"Unpublish":"Publish"}
              </button>
              <button onClick={()=>del(p.id)} style={{fontSize:12,color:"#dc2626",background:"none",border:"none",cursor:"pointer",padding:"5px 12px"}}>Delete</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#9ca3af"}}>No posts yet</div>}
      </div>
      {modal!==null&&<BlogModal post={modal?.id?modal:null} onClose={()=>setModal(null)} onSave={save}/>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState("dashboard");
  const[user,setUser]=useState(null);
  const[authChecked,setAuthChecked]=useState(false);
  const[appointments,setAppointments]=useState([]);
  const[leads,setLeads]=useState([]);
  const[posts,setPosts]=useState([]);
  const[loading,setLoading]=useState(true);

  // Auth check
  useEffect(()=>{
    const check=async()=>{
      try{
        const u=await auth?.me();
        if(u)setUser(u);
      }catch(e){}
      finally{setAuthChecked(true);}
    };
    check();
  },[]);

  // Load data
  const loadData=useCallback(async()=>{
    if(!user)return;
    setLoading(true);
    try{
      const[a,l,p]=await Promise.all([
        Appointment.list(),
        LeadForm.list(),
        BlogPost.list(),
      ]);
      setAppointments(a||[]);
      setLeads(l||[]);
      setPosts(p||[]);
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[user]);

  useEffect(()=>{loadData();},[loadData]);

  // Auto-refresh every 30s
  useEffect(()=>{
    if(!user)return;
    const t=setInterval(loadData,30000);
    return()=>clearInterval(t);
  },[user,loadData]);

  const logout=async()=>{try{await auth?.logout();}catch(e){}setUser(null);};

  if(!authChecked)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8f7f5"}}>
      <div style={{textAlign:"center"}}><Spinner/><p style={{color:"#9ca3af",fontSize:13,marginTop:10}}>Checking session...</p></div>
    </div>
  );

  if(!user)return <LoginPage onLogin={async()=>{const u=await auth?.me();setUser(u);}}/>;

  const pending=(appointments||[]).filter(a=>a.status==="Pending").length;
  const newLeads=(leads||[]).filter(l=>l.status==="New").length;

  const nav=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"appointments",icon:"📅",label:"Appointments",badge:pending},
    {id:"calendar",icon:"🗓️",label:"Calendar"},
    {id:"leads",icon:"💬",label:"Leads",badge:newLeads},
    {id:"blog",icon:"✍️",label:"Blog Posts"},
  ];

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Sidebar */}
      <div className="sidebar">
        <div style={{padding:"20px 16px 16px",borderBottom:"1px solid #1f1f1f"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:"#9d2040",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:15,color:"#fff",flexShrink:0}}>C</div>
            <div>
              <div className="playfair" style={{fontWeight:700,fontSize:14,color:"#fff",letterSpacing:".5px"}}>CAIR SPA</div>
              <div style={{fontSize:10,color:"#4b5563",fontWeight:500,textTransform:"uppercase",letterSpacing:".5px"}}>Admin Portal</div>
            </div>
          </div>
        </div>
        <nav style={{flex:1,padding:"12px 0",overflowY:"auto"}}>
          {nav.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
              <span style={{fontSize:15}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge>0&&<span style={{background:page===n.id?"rgba(255,255,255,.25)":"#9d2040",color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{n.badge}</span>}
            </div>
          ))}
        </nav>
        <div style={{padding:"12px 16px",borderTop:"1px solid #1f1f1f"}}>
          <div style={{fontSize:11,color:"#4b5563",marginBottom:8,padding:"0 8px",textTransform:"uppercase",letterSpacing:".5px",fontWeight:600}}>{user?.email}</div>
          <a href="https://cairspa.com" target="_blank" style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#6b7280",textDecoration:"none",padding:"7px 10px",borderRadius:8,background:"#1a1a1a",marginBottom:6}}>
            <span>🌐</span><span>cairspa.com</span><span style={{marginLeft:"auto",fontSize:10}}>↗</span>
          </a>
          <button onClick={logout} style={{width:"100%",padding:"7px 10px",borderRadius:8,background:"#1a1a1a",border:"none",cursor:"pointer",fontSize:12,color:"#6b7280",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
            <span>🚪</span><span>Sign Out</span>
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        <div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"12px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{fontSize:13,color:"#6b7280"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={loadData} style={{background:"none",border:"1px solid #e5e7eb",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12,color:"#6b7280",display:"flex",alignItems:"center",gap:5}}>
              🔄 Refresh
            </button>
            {newLeads>0&&<div style={{display:"flex",alignItems:"center",gap:6,background:"#fef3c7",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,color:"#92400e",cursor:"pointer"}} onClick={()=>setPage("leads")}>
              <div style={{width:7,height:7,background:"#ef4444",borderRadius:"50%"}}/>
              {newLeads} new lead{newLeads>1?"s":""}
            </div>}
          </div>
        </div>
        <div style={{padding:"28px",flex:1}}>
          {loading&&page==="dashboard"?<Loading/>:(
            <>
              {page==="dashboard"&&<Dashboard appointments={appointments} leads={leads} posts={posts} onNav={setPage}/>}
              {page==="appointments"&&<AppointmentsPage appointments={appointments} reload={loadData}/>}
              {page==="calendar"&&<CalendarView appointments={appointments} onEdit={a=>setPage("appointments")} onNew={()=>setPage("appointments")}/>}
              {page==="leads"&&<LeadsPage leads={leads} reload={loadData}/>}
              {page==="blog"&&<BlogPage posts={posts} reload={loadData}/>}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
